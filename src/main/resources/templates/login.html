<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Log-in</h1>
    <form action="/auth/login" method="post">
        <label>Email</label>
        <input type="email" name="email">
    
        <label>Senha</label>
        <input type="password" name="senha">
    
        <button type="submit">Entrar</button>
    </form>
</body>
</html>
