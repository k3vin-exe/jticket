<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Contato</title>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Contato com os desenvolvedores</h5>
                    </div>

                    <div class="card-body">

                        <form method="post" th:action="@{/contato}">
                            <div class="mb-3">
                                <label class="form-label">Assunto</label>
                                <input type="text" class="form-control" name="assunto" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mensagem</label>
                                <textarea class="form-control" rows="5" name="mensagem" required></textarea>
                            </div>

                            <button class="btn btn-primary w-100">
                                Enviar mensagem
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
 
</body>
</html>
