<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="shortcut icon" th:href="@{/favicon.ico}">
    <title>Chamados</title>
</head>
<body>
    <header>
        <nav class="navbar navbar-dark bg-dark">
            <div class="container-md">
                <a href="/" class="navbar-brand">
                    <img th:src="@{/jticketLogo.png}" alt="Logo" style="height: 60px;">
                </a>
                <div class="dropdown">
                    <a style="color: white;" class="btn dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        Usuário
                    </a>
        
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/perfil">Ver meu perfil</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <form method="post" action="/logout">
                                <button class="dropdown-item">Sair</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="container mt-4">
            <div class="card">
                <div class="card-header">
                    <h3>
                        Chamados
            
                        <div class="d-flex gap-2 float-end">
                            <a th:href="@{/chamados/novo}" class="btn btn-primary">
                                <i class="bi-plus-square"></i> Novo chamado
                            </a>
                        </div>
                    </h3>
                </div>
            
                <div class="card-body">
                    <table class="table table-bordered table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Prioridade</th>
                                <th>Título</th>
                                <th>Status</th>
                                <th class="text-nowrap" style="width: 1%;">Ações</th>
                            </tr>
                        </thead>
            
                        <tbody>
                            <tr th:each="chamado : ${chamados}">
                                <td th:text="${chamado.prioridade}"></td>
            
                                <td th:text="${chamado.titulo}"></td>
            
                                <td th:text="${chamado.status}"></td>
            
                                <td class="text-nowrap">
                                    <div class="d-flex gap-2">
                                        <a th:href="@{/chamados/{id}(id=${chamado.id})}" class="btn btn-secondary">
                                            <i class="bi-eye-fill"></i> Visualizar
                                        </a>
            
                                        <a th:href="@{/chamados/editar/{id}(id=${chamado.id})}" class="btn btn-success">
                                            <i class="bi-pencil-fill"></i> Atualizar
                                        </a>
                                    </div>
                                </td>
                            </tr>
            
                            <tr th:if="${#lists.isEmpty(chamados)}">
                                <td colspan="4" class="text-center text-muted">
                                    Nenhum chamado encontrado.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
